<!DOCTYPE html>
<html>
<head>
  <title>Language Learning Site</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
    }

    .topbar {
      background: #333;
      color: white;
      padding: 10px;
      display: flex;
    }

    .topbar button {
      margin-right: 10px;
      padding: 10px;
      cursor: pointer;
    }

    .container {
      display: flex;
    }

    .sidebar {
      width: 200px;
      background: #f0f0f0;
      padding: 20px;
    }

    .sidebar button {
      display: block;
      margin: 10px 0;
      width: 100%;
      padding: 10px;
      cursor: pointer;
    }

    .content {
      padding: 20px;
      flex: 1;
    }
  </style>

  <script>
    let currentLanguage = "french";

    function setLanguage(lang) {
      currentLanguage = lang;
      document.getElementById("content").innerHTML =
        "<h2>Select a category</h2>";
    }

    function showCategory(category) {
      const content = document.getElementById("content");

      content.innerHTML = `
        <h2>${currentLanguage.toUpperCase()} - ${category}</h2>
        <p>Content coming soon...</p>
      `;
    }
  </script>

</head>

<body>

<!-- 顶部语言栏 -->
<div class="topbar">
  <button onclick="setLanguage('french')">French</button>
  <button onclick="setLanguage('german')">German</button>
  <button onclick="setLanguage('spanish')">Spanish</button>
</div>

<div class="container">

  <!-- 左侧分类 -->
  <div class="sidebar">
    <h3>Categories</h3>
    <button onclick="showCategory('Reading')">Reading</button>
    <button onclick="showCategory('Writing')">Writing</button>
    <button onclick="showCategory('Teaching')">Teaching</button>
  </div>

  <!-- 右侧内容 -->
  <div class="content" id="content">
    <h1>Welcome</h1>
    <p>Select a language and category</p>
  </div>

</div>

</body>
</html>
